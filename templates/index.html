<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Dashboard</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        header {
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 24px;
            margin: 0 0 8px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .task-item:hover {
            transform: translateY(-1px);
        }

        .task-icon {
            color: var(--primary);
            margin-right: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <header>
            <h1>Task Workspace</h1>
            <p>Manage your daily objectives clean and simple.</p>
        </header>

        <form class="input-group" action="/add" method="POST">
            <input type="text" name="todo" placeholder="Create a new task..." required autocomplete="off">
            <button type="submit">Add Task</button>
        </form>

        <ul class="task-list">
            {% for todo in todos %}
                <li class="task-item">
                    <span class="task-icon">✓</span>
                    {{ todo }}
                </li>
            {% endfor %}
        </ul>
    </div>

</body>
</html>
